services:
  backend:
    build:
      context: ./backend/GastosApi
      dockerfile: Dockerfile
    container_name: gastos_backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Conexao: Data Source=/data/Banco.db;
    volumes:
      - backend_data:/data
    ports:
      - "5252:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: gastos_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  backend_data:
